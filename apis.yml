description: >-
  Royal Caribbean Group is a global cruise vacation company operating Royal
  Caribbean International, Celebrity Cruises, and Silversea Cruises. Royal
  Caribbean does not publish a public developer API. Travel partner and
  agent integration is operated through the CruisingPower B2B portal
  (cruisingpower.com), which requires authenticated agent access. The
  company also operates loyalty (Crown & Anchor Society) and consumer
  booking platforms with no public API surface.
